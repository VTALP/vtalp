{% extends "base.html" %}

{% block content %}
<section class="page-section">
    <div class="section-heading">
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
    </div>

    {% if items %}
    <div class="item-grid">
        {% for item in items %}
        <article class="feature-card">
            <h2>{{ item.name }}</h2>
            <p>{{ item.description }}</p>
            <a class="text-link" href="{{ item.url }}">Open</a>
        </article>
        {% endfor %}
    </div>
    {% endif %}
</section>
{% endblock %}
